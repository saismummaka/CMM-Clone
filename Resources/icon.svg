<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6A5ACD"/>
      <stop offset="50%" stop-color="#4169E1"/>
      <stop offset="100%" stop-color="#1E90FF"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.3" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#shine)"/>

  <!-- Central broom / sparkle mark -->
  <g transform="translate(512 512)" filter="url(#softGlow)">
    <!-- Outer glow ring -->
    <circle r="300" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="3"/>
    <circle r="240" fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="3"/>

    <!-- Large central sparkle -->
    <path d="M 0 -230 C 20 -90, 90 -20, 230 0 C 90 20, 20 90, 0 230 C -20 90, -90 20, -230 0 C -90 -20, -20 -90, 0 -230 Z"
          fill="url(#sparkle)"/>

    <!-- Small sparkles -->
    <path d="M -210 -180 C -200 -150, -180 -140, -150 -130 C -180 -120, -200 -110, -210 -80 C -220 -110, -240 -120, -270 -130 C -240 -140, -220 -150, -210 -180 Z"
          fill="#FFFFFF" opacity="0.85"/>
    <path d="M 220 170 C 230 195, 245 205, 270 215 C 245 225, 230 235, 220 260 C 210 235, 195 225, 170 215 C 195 205, 210 195, 220 170 Z"
          fill="#FFFFFF" opacity="0.75"/>
  </g>

  <!-- Subtle inner highlight -->
  <rect x="64" y="64" width="896" height="448" rx="200" ry="200" fill="#FFFFFF" opacity="0.05"/>
</svg>
